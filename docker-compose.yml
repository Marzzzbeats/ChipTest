services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: myapp
      MARIADB_USER: user
      MARIADB_PASSWORD: ChipTest123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://user:ChipTest123@db:3306/myapp
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  db_data: